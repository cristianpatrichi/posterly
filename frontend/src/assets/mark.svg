<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Photo collage</title>
  <desc id="desc">Stacked photo collage mark with a soft oval glow.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <radialGradient id="ovalGlow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#f9fbff" stop-opacity="0"/>
      <stop offset="58%" stop-color="#f9fbff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.92"/>
    </radialGradient>
    <linearGradient id="photoA" x1="14" y1="26" x2="78" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7db0ff"/>
      <stop offset="0.45" stop-color="#23354b"/>
      <stop offset="1" stop-color="#f4b860"/>
    </linearGradient>
    <linearGradient id="photoB" x1="22" y1="18" x2="78" y2="74" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edf4ff"/>
      <stop offset="0.48" stop-color="#86a7c6"/>
      <stop offset="1" stop-color="#1c2632"/>
    </linearGradient>
  </defs>

  <rect x="19" y="18" width="54" height="62" rx="5" fill="#ffffff" transform="rotate(-10 46 49)" filter="url(#shadow)"/>
  <rect x="25" y="24" width="42" height="42" rx="2" fill="url(#photoB)" transform="rotate(-10 46 49)"/>

  <rect x="23" y="16" width="54" height="62" rx="5" fill="#ffffff" transform="rotate(8 50 47)" filter="url(#shadow)"/>
  <rect x="29" y="22" width="42" height="42" rx="2" fill="url(#photoA)" transform="rotate(8 50 47)"/>

  <rect x="18" y="22" width="60" height="58" rx="6" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="25" y="29" width="46" height="37" rx="2" fill="#111827"/>
  <ellipse cx="48" cy="47.5" rx="25" ry="20" fill="#182236"/>
  <path d="M25 62c9-17 16-22 27-16 7 4 11 1 19-8v28H25z" fill="#5b8def"/>
  <circle cx="57" cy="39" r="7" fill="#ffd36a"/>
  <ellipse cx="48" cy="47.5" rx="27" ry="22" fill="url(#ovalGlow)"/>
</svg>

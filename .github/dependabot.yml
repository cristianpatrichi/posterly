version: 2
updates:
  # One grouped PR per ecosystem, monthly, so updates stay manageable instead of
  # a flood of individual PRs. Security updates are still raised promptly.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      docker:
        patterns: ["*"]
